<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AR Prototype</title>
  <link rel="icon" href="data:,">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; }
    #ar-container { width: 100vw; height: 100vh; position: relative; }
  </style>
  <!-- Tells the browser where to find 'three' when MindAR imports it as a bare specifier -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <div id="ar-container"></div>
  <!-- UMD build: sets window.rive; WASM loads automatically from /rive/rive.wasm -->
  <script src="/rive/rive.js"></script>
  <script type="module" src="/app.js"></script>
</body>
</html>
