<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AR Prototype</title>
  <link rel="icon" href="data:,">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    /* touch-action/overscroll: an AR viewport owns every touch. Without
       this, iOS Safari's default gestures (double-tap zoom, pan/rubber-band,
       long-press callout) visually scale or drag the camera feed + scene,
       which reads as the scene "rotating/adjusting" on stray taps. */
    html, body {
      overflow: hidden;
      touch-action: none;
      overscroll-behavior: none;
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
    }
    /* The page background must live on body ONLY — never on html. MindAR
       injects its camera <video> with z-index:-2; while html has no
       background of its own, body's background propagates to the root
       canvas and paints behind everything, so the video stays visible.
       Setting a background on html stops that propagation, and body's
       black then paints ABOVE negative-z-index descendants — a fully
       black screen with the camera feed hidden behind it. */
    body { background: #000; }
    /* isolation traps MindAR's negative-z-index video inside this
       container's own stacking context, so no page-level background can
       ever paint over it again regardless of future CSS changes. */
    #ar-container { width: 100vw; height: 100vh; position: relative; isolation: isolate; }
  </style>
</head>
<body>
  <div id="ar-container"></div>
  <!-- Vite-built bundle (three, mind-ar, and @rive-app/canvas-lite are
       bundled npm dependencies now, not CDN imports — see vite.config.ts).
       This single stable filename is produced by both `vite build` and
       `vite build --watch`, so this tag never needs to change between dev
       and production. -->
  <script type="module" src="/dist/main.js"></script>
</body>
</html>
