<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <!-- viewport-fit=cover: without it, iOS Safari keeps #camerafeed inside
       the safe-area-inset box on notched devices, leaving black bars where
       the canvas should extend edge-to-edge. Standard, inert on devices
       without a notch. -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>AR Prototype</title>
  <link rel="icon" href="data:,">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    /* touch-action/overscroll: an AR viewport owns every touch. Without
       this, iOS Safari's default gestures (double-tap zoom, pan/rubber-band,
       long-press callout) visually scale or drag the camera feed + scene,
       which reads as the scene "rotating/adjusting" on stray taps. */
    html, body {
      overflow: hidden;
      touch-action: none;
      overscroll-behavior: none;
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
    }
    /* The page background must live on body ONLY — never on html. MindAR
       injects its camera <video> with z-index:-2; while html has no
       background of its own, body's background propagates to the root
       canvas and paints behind everything, so the video stays visible.
       Setting a background on html stops that propagation, and body's
       black then paints ABOVE negative-z-index descendants — a fully
       black screen with the camera feed hidden behind it. */
    body { background: #000; }
    /* isolation traps MindAR's negative-z-index video inside this
       container's own stacking context, so no page-level background can
       ever paint over it again regardless of future CSS changes. */
    #ar-container { width: 100vw; height: 100vh; position: relative; isolation: isolate; }
    /* 8th Wall path (AR_SYSTEM.md's 8th-wall decision record). Unlike
       MindAR (video at negative z-index, needing the isolation guard
       above), 8th Wall draws the camera feed directly into this WebGL
       canvas via GlTextureRenderer — a normal, app-owned element. Coexists
       with #ar-container; only one is ever driven per page load, depending
       on which experience's `placement` field main.ts resolves. Rive
       overlays (MarkerLayer z-index:10, CardPanel z-index:20, UxOverlay
       z-index:30) self-mount to <body> above it, same as the MindAR path. */
    /* touch-action:none — declared PER ELEMENT on purpose: the html/body
       rule above does not inherit, and a pinch gesture starting on this
       canvas (most of the screen) was able to zoom the page — iOS ignores
       user-scalable=no, innerWidth then tracks the shrunken visual
       viewport, and the resize handler dutifully sizes the canvas to it,
       leaving dead space right/bottom (troubleshooting doc §10). */
    #camerafeed { position: fixed; inset: 0; width: 100vw; height: 100vh; touch-action: none; }
    /* Required by the 8th Wall XR Engine License (§1.3.1.2, "material in
       which Licensee utilizes the functionality of the Software" must
       carry attribution). z-index 25: above the AR canvas/Rive markers
       (10) and the Card (20), below the blocking UxOverlay (30) so it
       never fights a tap. */
    #powered-by-8thwall {
      position: fixed; left: 12px; bottom: 12px; z-index: 25;
      width: 96px; opacity: 0.85; pointer-events: auto;
    }
    #powered-by-8thwall img { display: block; width: 100%; }
  </style>
</head>
<body>
  <!-- ?debug=1 field-testing console — plain inline script, deliberately
       NOT part of the Vite bundle, so it installs before /dist/main.js
       (and any of its imports) even begins to evaluate. This is the fix
       for the Phase 2D console missing early boot/import failures: a
       class-constructor-time patch (inside a TS module) can only run
       AFTER that module's whole import graph has already resolved and
       executed — this repo has hit exactly that failure mode before (a
       missing npm dependency once made the entire module graph fail to
       load, silently, with nothing on screen to show for it). Plain
       synchronous JS, no build step, so it is guaranteed to run first. -->
  <script>
    (function () {
      if (!/(?:^|[?&])debug=1(?:&|$)/.test(location.search)) return;
      var bar = document.createElement('div');
      bar.id = 'ar-debug-console';
      bar.style.cssText =
        'position:fixed;top:0;left:0;right:0;max-height:38vh;overflow-y:auto;z-index:999999;' +
        'background:rgba(0,0,0,0.78);color:#8f8;font:11px/1.4 ui-monospace,monospace;' +
        'padding:4px 6px;white-space:pre-wrap;word-break:break-word;pointer-events:none;';
      document.body.appendChild(bar);

      var MAX_LINES = 200;
      function append(text, color) {
        var row = document.createElement('div');
        row.style.color = color;
        row.textContent = new Date().toISOString().slice(11, 23) + '  ' + text;
        bar.appendChild(row);
        while (bar.childElementCount > MAX_LINES) bar.removeChild(bar.firstChild);
        bar.scrollTop = bar.scrollHeight;
      }
      function stringify(args) {
        return Array.prototype.map.call(args, function (arg) {
          if (typeof arg === 'string') return arg;
          if (arg && typeof arg === 'object' && 'message' in arg && 'stack' in arg) {
            return (arg.name || 'Error') + ': ' + arg.message;
          }
          try { return JSON.stringify(arg); } catch (e) { return String(arg); }
        }).join(' ');
      }

      var original = { log: console.log, warn: console.warn, error: console.error };
      console.log = function () { original.log.apply(console, arguments); append(stringify(arguments), '#8f8'); };
      console.warn = function () { original.warn.apply(console, arguments); append(stringify(arguments), '#fc5'); };
      console.error = function () { original.error.apply(console, arguments); append(stringify(arguments), '#f66'); };

      window.addEventListener('error', function (event) {
        append('[uncaught] ' + event.message + ' (' + event.filename + ':' + event.lineno + ':' + event.colno + ')', '#f66');
      });
      window.addEventListener('unhandledrejection', function (event) {
        append('[unhandled rejection] ' + String(event.reason), '#f66');
      });

      console.log('[ar-debug-console] active before module script — ' + new Date().toISOString());
    })();
  </script>
  <div id="ar-container"></div>
  <!-- Inline style duplicates the #camerafeed stylesheet rule below on
       purpose (Phase 3D): on-device measurement showed getBoundingClientRect()
       stuck at the raw HTML canvas default (300x150) despite the external
       rule targeting the confirmed-correct element, for a reason not yet
       isolated. An inline attribute wins any stylesheet-cascade ambiguity
       outright, so this is a cheap, harmless second path to the same box
       size while EightWallSession's own JS-side renderer.setSize(...,true)
       does the authoritative fix. Keep both rules in sync if either changes. -->
  <canvas id="camerafeed" style="position: fixed; inset: 0; width: 100vw; height: 100vh; display: block; touch-action: none;"></canvas>
  <a id="powered-by-8thwall" href="https://8thwall.org" target="_blank" rel="noopener">
    <img src="/xr/resources/powered-by.svg" alt="Powered by 8th Wall" />
  </a>
  <!-- 8th Wall engine binary, self-hosted from /xr (server/createServer.ts
       — no CDN at runtime, AR_SYSTEM.md §C/§F). Loaded as a plain script,
       never bundled: the binary has its own chunk loader;
       data-preload-chunks="slam" starts fetching the world-tracking chunk
       immediately. Loaded unconditionally (same as MindAR's bundled cost
       today) even on pages that resolve to a MindAR experience — harmless
       (EightWallSession.start() is simply never called then) but a real,
       known cost worth revisiting if bundle size becomes a concern. -->
  <script src="/xr/xr.js" async data-preload-chunks="slam"></script>
  <!-- Vite-built bundle (three, mind-ar, and @rive-app/canvas are bundled
       npm dependencies now, not CDN imports — see vite.config.ts). This
       single stable filename is produced by both `vite build` and
       `vite build --watch`, so this tag never needs to change between dev
       and production. -->
  <script type="module" src="/dist/main.js"></script>
</body>
</html>
